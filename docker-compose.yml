name: quitt_diagnostic

services:
  mysql:
    image: mysql:8.0
    container_name: quitt_diagnostics
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quitt_diagnostics
    ports:
      - "3308:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: quitt
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    restart: always

volumes:
  mysql_data_v2:
